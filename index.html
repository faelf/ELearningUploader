<!doctype html>
<html lang="en-GB">

<head>
  <script>
    (() => {
      const savedTheme = localStorage.getItem("theme");
      const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "light";

      document.documentElement.dataset.theme = savedTheme ?? systemTheme;
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="src/style/style.css">
  <script type="module" src="src/main.ts"></script>
  <title>E-Learning Uploader</title>
</head>

<body>
  <header>
    <div class="container">
      <h1>E-Learning Uploader</h1>
    </div>
  </header>

  <main>
    <section class="container">
      <h2 class="mb-md">Training Certification Tool</h2>

      <p>Enter the employee ID, select the training, and set the completion date. Add entries to build a CSV for upload.</p>

      <form id="preview-form" class="grid gap-sm mb-md">

        <label id="input-users" class="searchable-select">
          <input type="text" class="select-input icon-user" autocomplete="off" required placeholder="Search user ...">
          <input type="hidden" name="email">
          <div class="select-options">
            <!-- JS -->
          </div>
        </label>


        <label id="input-trainings" class="searchable-select">
          <input type="text" class="select-input icon-training" autocomplete="off" placeholder="Search trainings ...">
          <input type="hidden" name="training">
          <div class="select-options">
            <!-- JS -->
          </div>
        </label>

        <input type="date" name="completion-date" required>

        <button type="reset" class="btn yellow">Reset</button>
        <button type="submit" class="btn primary">Add</button>
      </form>

      <h3 class="mb-md">Uploader Preview</h3>
      <div id="table-container" class="mb-md preview-table">
        <!-- JS -->
      </div>
    </section>
  </main>

  <footer>
    <div class="container grid col-300-fit gap-md items-start">
      <section class="grid gap-sm">
        <h3>Preview Data</h3>
        <form id="preview-data" class="grid gap-sm">
          <p class="mb-0">Review the entries above before downloading the CSV file for upload.</p>
          <div class="grid gap-sm">
            <button type="button" class="btn primary" data-action="download-csv">Download CSV</button>
            <button type="button" class="btn red" data-action="clear-data">Clear Data</button>
          </div>
        </form>
      </section>
      <section class="grid gap-sm">
        <h3>Theme</h3>
        <p>Select your preferred theme</p>
        <button type="button" class="btn" data-action="theme">Change Theme</button>
      </section>
    </div>
  </footer>
</body>

</html>
